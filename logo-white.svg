<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 68" width="260" height="68" role="img" aria-label="EduCore Logo">
  <defs>
    <linearGradient id="badgeGradW" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8bb2e"/>
      <stop offset="100%" stop-color="#C9A227"/>
    </linearGradient>
    <linearGradient id="goldGradW" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b5e"/>
      <stop offset="100%" stop-color="#0a1445"/>
    </linearGradient>
    <linearGradient id="goldGradHW" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1b5e"/>
      <stop offset="100%" stop-color="#162272"/>
    </linearGradient>
  </defs>

  <!-- Gold badge on dark backgrounds -->
  <rect x="2" y="6" width="58" height="58" rx="15" fill="rgba(0,0,0,0.2)"/>
  <rect x="0" y="4" width="58" height="58" rx="15" fill="url(#badgeGradW)"/>

  <!-- Stylised E in navy (inverted) -->
  <rect x="13" y="18" width="8" height="36" rx="4" fill="url(#goldGradW)"/>
  <rect x="13" y="18" width="33" height="10" rx="5" fill="url(#goldGradHW)"/>
  <rect x="13" y="31" width="25" height="10" rx="5" fill="url(#goldGradHW)"/>
  <rect x="13" y="44" width="33" height="10" rx="5" fill="url(#goldGradHW)"/>

  <circle cx="50" cy="12" r="3" fill="rgba(13,27,94,0.4)"/>

  <!-- "Edu" in white -->
  <text x="74" y="47" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="30" font-weight="800" letter-spacing="-0.8" fill="#ffffff">Edu</text>
  <!-- "Core" in gold -->
  <text x="134" y="47" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="30" font-weight="800" letter-spacing="-0.8" fill="#e8bb2e">Core</text>

  <!-- Tagline in muted white -->
  <text x="75" y="61" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="9.5" font-weight="500" letter-spacing="2" fill="rgba(255,255,255,0.45)">INSTITUTION ERP</text>
</svg>
